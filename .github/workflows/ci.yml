name: ci

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc fasm lua5.4

      - name: run tests
        run: sudo lua tests/main.lua
